name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  test-sdk:
    name: SDK — test + typecheck
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/client/package-lock.json
      - run: npm ci
        working-directory: packages/client
      - run: npm test
        working-directory: packages/client
      - run: npm run typecheck
        working-directory: packages/client

  test-react:
    name: React — test + typecheck
    runs-on: ubuntu-latest
    needs: test-sdk
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      # React package has a file:../client devDep. Client must be built so
      # its dist/index.d.ts is resolvable during react's tsc/vitest run.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/client/package-lock.json
      - name: Build client (for react's type resolution)
        run: npm ci && npm run build
        working-directory: packages/client
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/react/package-lock.json
      - run: npm ci
        working-directory: packages/react
      - run: npm test
        working-directory: packages/react
      - run: npm run typecheck
        working-directory: packages/react

  build-demo:
    name: Demo — build
    runs-on: ubuntu-latest
    needs: test-sdk
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      # Demo depends on @zerosync/client + @zerosync/react via file:../packages/*.
      # Both packages' dist/ output must exist for Vite's commonjs resolver
      # to locate their package.json main/module/exports entries.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/client/package-lock.json
      - name: Build SDK
        run: npm ci && npm run build
        working-directory: packages/client
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/react/package-lock.json
      - name: Build react hooks package
        run: npm ci && npm run build
        working-directory: packages/react
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: demo/package-lock.json
      - name: Build demo
        run: npm ci && npm run build
        working-directory: demo
        env:
          VITE_SERVER_URL: wss://demo.zerosync.dev/ws
