name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'  # every Monday at 03:00 UTC

permissions: read-all

jobs:
  analyze:
    name: Analyze (TypeScript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@5c8a8a642e79153f5d047b10ec1cba1d1cc65699  # v3.35.1
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/client/package-lock.json

      - name: Build SDK
        run: npm ci && npm run build
        working-directory: packages/client

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@5c8a8a642e79153f5d047b10ec1cba1d1cc65699  # v3.35.1
        with:
          category: '/language:javascript-typescript'
