name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"

      - name: Build client SDK
        working-directory: packages/client
        run: |
          npm ci
          npm run build

      - name: Build demo SPA
        working-directory: demo
        env:
          # Signaling server URL — set in repo variables (Settings → Variables).
          # Example: wss://123.45.67.89:8080/ws (Hetzner IP)
          # When a custom domain is ready, change to wss://demo.zerosync.dev/ws
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build

      # SPA routing: copy index.html → 404.html so GitHub Pages serves the
      # app for all routes (React Router / hash-based routing).
      - name: SPA fallback
        run: cp demo/dist/index.html demo/dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        with:
          path: demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
