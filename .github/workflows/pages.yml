name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"

      # ── Build client SDK (needed for demo's + react package's deps) ──
      - name: Build client SDK
        working-directory: packages/client
        run: |
          npm ci
          npm run build

      # ── Build react hooks package (demo depends on its dist/) ──
      - name: Build react hooks package
        working-directory: packages/react
        run: |
          npm ci
          npm run build

      # ── Build landing page (Astro static, deploys to /ZeroSync/ root) ──
      - name: Build landing
        working-directory: landing
        run: |
          npm ci
          npm run build

      # ── Build demo (React + Vite, deploys to /ZeroSync/demo/) ──
      - name: Build demo SPA
        working-directory: demo
        env:
          # Signaling server URL — set in repo variables (Settings → Variables).
          # Example: wss://123.45.67.89:8080/ws (Hetzner IP)
          # When a custom domain is ready, change to wss://demo.zerosync.dev/ws
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL }}
          # Demo moved from /ZeroSync/ root to /ZeroSync/demo/ subpath.
          VITE_BASE_PATH: /${{ github.event.repository.name }}/demo/
        run: |
          npm ci
          npm run build

      # ── Combine artifacts: landing at root, demo at /demo/ ──
      - name: Assemble gh-pages artifact
        run: |
          mkdir -p combined/demo
          cp -r landing/dist/. combined/
          cp -r demo/dist/. combined/demo/
          # SPA fallback so client-side routing in demo works on direct URLs
          cp demo/dist/index.html combined/demo/404.html
          echo "=== combined/ layout ==="
          ls -la combined/
          echo "=== combined/demo/ ==="
          ls -la combined/demo/ | head -15

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        with:
          path: combined

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
