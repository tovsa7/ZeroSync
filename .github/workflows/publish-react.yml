name: Publish React Hooks

on:
  workflow_dispatch:
    inputs:
      otp:
        description: 'npm 2FA OTP (6-digit code)'
        required: true

permissions: read-all

jobs:
  test:
    name: React — test + typecheck
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # Build the client package first — the react package's devDep
      # "@tovsa7/zerosync-client": "file:../client" resolves to a sibling
      # directory whose tsup output (dist/) is required for type resolution
      # during react's tsc/vitest compilation.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/client/package-lock.json
      - name: Build client (for react's type resolution)
        run: npm ci && npm run build
        working-directory: packages/client

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/react/package-lock.json
      - run: npm ci
        working-directory: packages/react
      - run: npm test
        working-directory: packages/react
      - run: npm run typecheck
        working-directory: packages/react

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write          # required for SLSA provenance via OIDC
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # Build client first — same reason as above.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/client/package-lock.json
      - run: npm ci && npm run build
        working-directory: packages/client

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: packages/react/package-lock.json
      - run: npm ci
        working-directory: packages/react
      - run: npm run build
        working-directory: packages/react
      - run: npm publish --provenance --access public --otp ${{ inputs.otp }}
        working-directory: packages/react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
