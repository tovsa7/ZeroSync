name: Publish SDK

on:
  workflow_dispatch:
    inputs:
      otp:
        description: 'npm 2FA OTP (6-digit code)'
        required: true

jobs:
  test:
    name: SDK — test + typecheck
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/client/package-lock.json
      - run: npm ci
        working-directory: packages/client
      - run: npm test
        working-directory: packages/client
      - run: npm run typecheck
        working-directory: packages/client

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: packages/client/package-lock.json
      - run: npm ci
        working-directory: packages/client
      - run: npm run build
        working-directory: packages/client
      - run: npm publish --provenance --access public --otp ${{ inputs.otp }}
        working-directory: packages/client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
