# ZeroSync Self-Hosted Stack
#
# Deploys the ZeroSync signaling server + reverse proxy with auto-TLS.
#
#   - zerosync  — Go signaling server (ICE/SDP exchange between peers)
#   - caddy     — reverse proxy with automatic TLS via Let's Encrypt
#
# Note: encrypted relay fallback for strict NATs is on the roadmap — not
#       yet shipped. This compose file deploys the signaling-only server.
#
# Prerequisites:
#   - Docker >= 24 and Docker Compose >= 2.20
#   - A domain with DNS A record pointing to this server
#   - Ports 80 and 443 open
#
# Usage:
#   1. cp .env.example .env
#   2. Edit .env — set ZEROSYNC_DOMAIN and optionally ZEROSYNC_LICENSE_KEY
#   3. docker compose up -d
#   4. curl https://your.domain.com/health

services:

  zerosync:
    image: ghcr.io/tovsa7/zerosync-server:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - GOMAXPROCS=${GOMAXPROCS:-2}
      - ZEROSYNC_LICENSE_KEY=${ZEROSYNC_LICENSE_KEY}
      - ZEROSYNC_LICENSE_SECRET=${ZEROSYNC_LICENSE_SECRET}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - ZEROSYNC_DOMAIN=${ZEROSYNC_DOMAIN}
    restart: unless-stopped
    depends_on:
      zerosync:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
